name: Daily Bluesky Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly gives permission to save the file
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4 to fix the warning

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5 to fix the warning
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Automated news update" || exit 0
          git push
